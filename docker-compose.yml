services:
  bot:
    build: .
    command: python -m src.main
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json:ro
      - data:/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - api

  api:
    build: .
    command: >
      uvicorn src.api.app:create_app
      --factory
      --host 0.0.0.0
      --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json:ro
      - data:/data
      - hf_cache:/root/.cache/huggingface

volumes:
  data:
  hf_cache:

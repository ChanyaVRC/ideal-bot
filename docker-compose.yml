services:
  bot:
    build: .
    command: python -m src.main
    restart: unless-stopped
    environment:
      LOG_FILE: /data/ideal_bot.log
    volumes:
      - type: bind
        source: ${CONFIG_FILE:-./config.json}
        target: /app/config.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${DATA_DIR:-./data}
        target: /data
        bind:
          create_host_path: true
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - api

  api:
    build: .
    command: >
      uvicorn src.api.app:create_app
      --factory
      --host 0.0.0.0
      --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LOG_FILE: /data/ideal_bot.log
    volumes:
      - type: bind
        source: ${CONFIG_FILE:-./config.json}
        target: /app/config.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${DATA_DIR:-./data}
        target: /data
        bind:
          create_host_path: true
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:

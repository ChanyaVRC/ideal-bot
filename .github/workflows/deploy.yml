name: Deploy

on:
  push:
    branches: [master]

# DEPLOY_MODE リポジトリ変数で切り替える（Settings > Variables > Actions）
# docker   : Docker Compose でデプロイ（デフォルト）
# systemd  : systemd + nginx でデプロイ

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra web --group dev

      - name: Run Python tests
        run: uv run pytest tests/ -v

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/ideal-bot
            if [[ "${{ vars.DEPLOY_MODE }}" == "systemd" ]]; then
              ./scripts/update.sh
              sudo systemctl restart ideal-bot ideal-bot-api
            else
              ./scripts/update.sh --docker
            fi
            echo "Deploy complete."
